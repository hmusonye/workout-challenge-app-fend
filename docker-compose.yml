services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - challenge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 8
    deploy:
      resources:
        limits: {memory: 512M, cpus: "1.0"}
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: reps-challenge:${APP_TAG:-local}
    restart: unless-stopped
    depends_on:
      db: {condition: service_healthy}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      OWNER_EMAIL: ${OWNER_EMAIL}
      OWNER_NAME: ${OWNER_NAME:-Owner}
    expose: ["3000"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits: {memory: 768M, cpus: "1.0"}
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    image: reps-caddy:${APP_TAG:-local}
    restart: unless-stopped
    depends_on:
      app: {condition: service_healthy}
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    ports: ["80:80", "443:443", "443:443/udp"]
    volumes:
      - caddy_data:/data
      - caddy_config:/config
volumes:
  challenge_postgres_data:
  caddy_data:
  caddy_config:
